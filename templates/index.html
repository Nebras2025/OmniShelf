<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book AI Recommendation</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            min-height: 100vh;
            /* Background image setup */
            background-image: url("{{ url_for('static', filename='Vinland-background-image021.png') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
            /* Alignment for the right side */
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            padding-top: 70px;
            padding-right: 20%; /* Responsive padding */
        }

        .container {
            width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        form {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
        }

        h1 {
            margin-bottom: 25px;
            color: #222;
            text-align: center;
            font-size: 24px;
        }

        label {
            font-weight: bold;
            color: #333;
            display: block;
            margin-top: 10px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 18px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 15px;
        }

        button {
            width: 100%;
            background-color: #2e7d32;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
            font-size: 16px;
        }

        button:hover {
            background-color: #1b5e20;
        }

        /* Results Styling */
        .results-section {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 15px;
            color: white;
            max-height: 400px;
            overflow-y: auto;
        }

        .book-card {
            background: rgba(255, 255, 255, 1);
            color: #333;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            border-left: 5px solid #2e7d32;
        }

        .book-card h3 {
            margin: 0 0 5px 0;
            font-size: 18px;
            color: #1b5e20;
        }

        .book-meta {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <form action="/recommend" method="POST">
            <h1>📚 Book AI Recommendation</h1>
            
            <label for="price">Maximum Price ($):</label>
            <input type="number" id="price" name="price" step="0.01" placeholder="e.g. 20.00" required>

            <label for="rating">Minimum Rating:</label>
            <select id="rating" name="rating" required>
                <option value="" disabled selected>Select Rating</option>
                <option value="1">⭐</option>
                <option value="2">⭐⭐</option>
                <option value="3">⭐⭐⭐</option>
                <option value="4">⭐⭐⭐⭐</option>
                <option value="5">⭐⭐⭐⭐⭐</option>
            </select>

            <button type="submit">Find Recommendations</button>
        </form>

        {% if results %}
        <div class="results-section">
            <h2 style="text-align: center; margin-top: 0;">Top Picks for You</h2>
            {% for book in results %}
            <div class="book-card">
                <h3>{{ book.book_name }}</h3>
                <div class="book-meta">
                    <strong>Price:</strong> ${{ book.Price }} | 
                    <strong>Rating:</strong> {{ book.Rating }}/5
                </div>
            </div>
            {% endfor %}
        </div>
        {% endif %}
    </div>

</body>
</html>
